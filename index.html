<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Policy Assistant</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    background: #0f172a;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    width: 420px;
    height: 650px;
    background: #1e293b;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

/* Header */
.header {
    padding: 15px;
    text-align: center;
    background: #020617;
    border-top-left-radius: 15px;
    border-top-right-radius: 15px;
    font-weight: bold;
    font-size: 18px;
}

/* Chat area */
.chat-box {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

/* Messages */
.message {
    padding: 10px 14px;
    margin: 8px 0;
    border-radius: 10px;
    max-width: 75%;
    line-height: 1.4;
}

.user {
    background: #3b82f6;
    align-self: flex-end;
    margin-left: auto;
}

.bot {
    background: #334155;
}

/* Input area */
.input-area {
    display: flex;
    padding: 10px;
    background: #020617;
    border-bottom-left-radius: 15px;
    border-bottom-right-radius: 15px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #22c55e;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

/* Loader */
.loader {
    font-size: 12px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">
    <div class="header">🤖 AI Policy Assistant</div>

    <div id="chat-box" class="chat-box"></div>

    <div class="input-area">
        <input id="input" placeholder="Ask in Hindi or English..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
async function sendMessage() {
    let inputField = document.getElementById("input");
    let message = inputField.value.trim();
    if (!message) return;

    let chatBox = document.getElementById("chat-box");

    // User message
    chatBox.innerHTML += `<div class="message user">${message}</div>`;

    // Bot placeholder
    let botDiv = document.createElement("div");
    botDiv.className = "message bot loader";
    botDiv.innerText = "Thinking...";
    chatBox.appendChild(botDiv);

    chatBox.scrollTop = chatBox.scrollHeight;

    inputField.value = "";

    try {
        let res = await fetch("/ask", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({query: message})
        });

        let data = await res.json();

        botDiv.classList.remove("loader");
        botDiv.innerText = data.answer;

    } catch (err) {
        botDiv.innerText = "Error connecting to server.";
    }

    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
